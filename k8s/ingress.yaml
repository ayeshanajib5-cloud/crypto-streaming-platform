apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: crypto-platform-ingress
  namespace: crypto-streaming

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:

          - path: /api
            pathType: Prefix

            backend:
              service:
                name: crypto-api-service

                port:
                  number: 80

          - path: /grafana
            pathType: Prefix

            backend:
              service:
                name: grafana-service

                port:
                  number: 3000

          - path: /prometheus
            pathType: Prefix

            backend:
              service:
                name: prometheus-service

                port:
                  number: 9090