apiVersion: apps/v1
kind: Deployment

metadata:
  name: grafana
  namespace: crypto-streaming

spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana

    spec:
      containers:
        - name: grafana

          image: grafana/grafana

          ports:
            - containerPort: 3000

          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-data