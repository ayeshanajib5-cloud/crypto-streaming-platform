apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
  namespace: crypto-streaming

spec:
  serviceName: zookeeper
  replicas: 1

  selector:
    matchLabels:
      app: zookeeper

  template:
    metadata:
      labels:
        app: zookeeper

    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.6.1

          ports:
            - containerPort: 2181

          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          livenessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 15
            periodSeconds: 5

          volumeMounts:
            - name: zookeeper-storage
              mountPath: /var/lib/zookeeper

  volumeClaimTemplates:
    - metadata:
        name: zookeeper-storage
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: gp2
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: crypto-streaming

spec:
  selector:
    app: zookeeper

  ports:
    - port: 2181
      targetPort: 2181

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: crypto-streaming

spec:
  serviceName: kafka
  replicas: 1

  selector:
    matchLabels:
      app: kafka

  template:
    metadata:
      labels:
        app: kafka

    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.1

          ports:
            - containerPort: 9092

          env:
            - name: KAFKA_BROKER_ID
              value: "1"

            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"

            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"

            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092"

            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 15

          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10

          volumeMounts:
            - name: kafka-storage
              mountPath: /var/lib/kafka/data

  volumeClaimTemplates:
    - metadata:
        name: kafka-storage
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: gp2
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: crypto-streaming

spec:
  selector:
    app: kafka

  ports:
    - port: 9092
      targetPort: 9092