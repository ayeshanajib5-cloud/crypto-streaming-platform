apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-streaming
  namespace: crypto-streaming

spec:
  replicas: 1

  selector:
    matchLabels:
      app: spark-streaming

  template:
    metadata:
      labels:
        app: spark-streaming

    spec:
      containers:
        - name: spark-streaming
          image: crypto-streaming-platform-spark:latest
          imagePullPolicy: Never

          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

          envFrom:
            - configMapRef:
                name: crypto-config