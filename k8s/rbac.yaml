apiVersion: v1
kind: ServiceAccount
metadata:
  name: crypto-api-sa
  namespace: crypto-streaming
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crypto-producer-sa
  namespace: crypto-streaming
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crypto-spark-sa
  namespace: crypto-streaming
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crypto-airflow-sa
  namespace: crypto-streaming
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crypto-read-role
  namespace: crypto-streaming
rules:
- apiGroups: [""]
  resources: ["pods","services","configmaps"]
  verbs: ["get","list","watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crypto-api-binding
  namespace: crypto-streaming
subjects:
- kind: ServiceAccount
  name: crypto-api-sa
roleRef:
  kind: Role
  name: crypto-read-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crypto-producer-binding
  namespace: crypto-streaming
subjects:
- kind: ServiceAccount
  name: crypto-producer-sa
roleRef:
  kind: Role
  name: crypto-read-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crypto-spark-binding
  namespace: crypto-streaming
subjects:
- kind: ServiceAccount
  name: crypto-spark-sa
roleRef:
  kind: Role
  name: crypto-read-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crypto-airflow-binding
  namespace: crypto-streaming
subjects:
- kind: ServiceAccount
  name: crypto-airflow-sa
roleRef:
  kind: Role
  name: crypto-read-role
  apiGroup: rbac.authorization.k8s.io