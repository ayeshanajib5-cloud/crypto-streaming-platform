apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: crypto-streaming
type: Opaque
stringData:
  REDIS_PASSWORD: cryptoRedis123

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: crypto-streaming

spec:
  serviceName: redis
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: redis:7

          command:
            - redis-server

          args:
            - "--requirepass"
            - "$(REDIS_PASSWORD)"

          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD

          ports:
            - containerPort: 6379

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10

          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5

          volumeMounts:
            - name: redis-storage
              mountPath: /data

  volumeClaimTemplates:
    - metadata:
        name: redis-storage

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: gp2

        resources:
          requests:
            storage: 1Gi