apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-api
  namespace: crypto-streaming

spec:
  replicas: 2

  selector:
    matchLabels:
      app: crypto-api

  template:
    metadata:
      labels:
        app: crypto-api

    spec:
      containers:
        - name: crypto-api
          image: crypto-streaming-platform-api:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

          envFrom:
            - configMapRef:
                name: crypto-config

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"