apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-api
  namespace: crypto-streaming

spec:
  replicas: 2

  selector:
    matchLabels:
      app: crypto-api

  template:
    metadata:
      labels:
        app: crypto-api

    spec:
      containers:
        - name: crypto-api

          image: crypto-streaming-platform-api:latest

          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          env:
            - name: POSTGRES_DB
              value: crypto_db

            - name: POSTGRES_USER
              value: crypto_user

            - name: POSTGRES_PASSWORD
              value: crypto_password

            - name: POSTGRES_HOST
              value: postgres

            - name: POSTGRES_PORT
              value: "5432"

            - name: REDIS_HOST
              value: redis

            - name: REDIS_PORT
              value: "6379"

          livenessProbe:
            httpGet:
              path: /health
              port: 8000

            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 8000

            initialDelaySeconds: 10
            periodSeconds: 5

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"